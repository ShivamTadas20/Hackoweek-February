<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>College Chatbot — Web</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0d0f14;
    --surface: #161923;
    --surface2: #1e2330;
    --border: #2a3045;
    --accent: #5b9cf6;
    --accent2: #7c5ef5;
    --user-bubble: linear-gradient(135deg,#5b9cf6,#7c5ef5);
    --bot-bubble: #1e2330;
    --text: #e8ecf4;
    --text-muted: #6b7a99;
    --green: #34d399;
    --yellow: #fbbf24;
    --red: #f87171;
    --radius: 18px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Mono', monospace;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .app-shell {
    width: 100%;
    max-width: 480px;
    height: 100vh;
    max-height: 860px;
    display: flex;
    flex-direction: column;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 24px;
    overflow: hidden;
    box-shadow: 0 30px 80px rgba(0,0,0,0.6);
  }

  /* HEADER */
  .header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 18px 20px;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    position: relative;
  }
  .header-avatar {
    width: 44px; height: 44px;
    border-radius: 14px;
    background: var(--user-bubble);
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
    flex-shrink: 0;
  }
  .header-info h1 {
    font-family: 'Syne', sans-serif;
    font-size: 17px;
    font-weight: 700;
    letter-spacing: -0.3px;
  }
  .header-info span {
    font-size: 11px;
    color: var(--green);
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .header-info span::before {
    content: '';
    display: inline-block;
    width: 7px; height: 7px;
    background: var(--green);
    border-radius: 50%;
    animation: pulse 1.8s infinite;
  }
  @keyframes pulse {
    0%,100% { opacity: 1; }
    50% { opacity: 0.3; }
  }
  .platform-badge {
    margin-left: auto;
    background: rgba(91,156,246,0.15);
    border: 1px solid rgba(91,156,246,0.3);
    color: var(--accent);
    padding: 4px 10px;
    border-radius: 100px;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  /* QUICK CHIPS */
  .chips {
    display: flex;
    gap: 8px;
    padding: 12px 16px;
    overflow-x: auto;
    scrollbar-width: none;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .chips::-webkit-scrollbar { display: none; }
  .chip {
    flex-shrink: 0;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-muted);
    padding: 5px 12px;
    border-radius: 100px;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.18s ease;
    white-space: nowrap;
  }
  .chip:hover {
    background: rgba(91,156,246,0.12);
    border-color: var(--accent);
    color: var(--accent);
  }

  /* MESSAGES */
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }
  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .msg-row {
    display: flex;
    align-items: flex-end;
    gap: 8px;
    animation: fadeUp 0.25s ease;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .msg-row.user { flex-direction: row-reverse; }

  .avatar-sm {
    width: 30px; height: 30px;
    border-radius: 10px;
    background: var(--user-bubble);
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
    flex-shrink: 0;
  }
  .msg-row.user .avatar-sm {
    background: linear-gradient(135deg,#5b9cf6,#7c5ef5);
  }
  .msg-row.bot .avatar-sm {
    background: linear-gradient(135deg,#34d399,#059669);
  }

  .bubble {
    max-width: 72%;
    padding: 11px 15px;
    border-radius: var(--radius);
    font-size: 13px;
    line-height: 1.55;
    position: relative;
    word-break: break-word;
  }
  .msg-row.bot .bubble {
    background: var(--bot-bubble);
    border: 1px solid var(--border);
    border-bottom-left-radius: 5px;
    color: var(--text);
  }
  .msg-row.user .bubble {
    background: var(--user-bubble);
    border-bottom-right-radius: 5px;
    color: #fff;
  }

  .timestamp {
    font-size: 9px;
    color: var(--text-muted);
    margin-top: 4px;
    padding: 0 4px;
    text-align: right;
  }
  .msg-row.bot .timestamp { text-align: left; }

  .msg-col { display: flex; flex-direction: column; }
  .msg-row.user .msg-col { align-items: flex-end; }

  /* Typing indicator */
  .typing-indicator { display: flex; align-items: center; gap: 5px; padding: 10px 14px; }
  .typing-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--text-muted); animation: blink 1.2s infinite; }
  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes blink { 0%,80%,100% { opacity: 0.2; } 40% { opacity: 1; } }

  /* Status tag in message */
  .tag {
    display: inline-block;
    padding: 2px 7px;
    border-radius: 100px;
    font-size: 9px;
    font-weight: 600;
    margin-bottom: 5px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .tag-advisor { background: rgba(251,191,36,0.15); color: var(--yellow); border: 1px solid rgba(251,191,36,0.3); }
  .tag-warning  { background: rgba(248,113,113,0.15); color: var(--red); border: 1px solid rgba(248,113,113,0.3); }
  .tag-info     { background: rgba(91,156,246,0.15); color: var(--accent); border: 1px solid rgba(91,156,246,0.3); }

  /* INPUT AREA */
  .input-area {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 14px 16px;
    background: var(--surface2);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }
  .input-box {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 11px 16px;
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s;
    resize: none;
    max-height: 100px;
    line-height: 1.5;
  }
  .input-box::placeholder { color: var(--text-muted); }
  .input-box:focus { border-color: var(--accent); }

  .send-btn {
    width: 42px; height: 42px;
    border-radius: 12px;
    background: var(--user-bubble);
    border: none;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: #fff;
    font-size: 18px;
    transition: opacity 0.2s, transform 0.15s;
    flex-shrink: 0;
  }
  .send-btn:hover { opacity: 0.85; transform: scale(1.05); }
  .send-btn:active { transform: scale(0.95); }

  /* Advisor link in bot bubble */
  .advisor-link {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    margin-top: 8px;
    padding: 6px 12px;
    background: rgba(251,191,36,0.1);
    border: 1px solid rgba(251,191,36,0.25);
    border-radius: 8px;
    color: var(--yellow);
    font-size: 11px;
    cursor: pointer;
    text-decoration: none;
    transition: background 0.2s;
  }
  .advisor-link:hover { background: rgba(251,191,36,0.2); }

  /* Suggestion pills after message */
  .suggestions {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 8px;
  }
  .sug-pill {
    background: rgba(91,156,246,0.08);
    border: 1px solid rgba(91,156,246,0.2);
    color: var(--accent);
    padding: 4px 10px;
    border-radius: 100px;
    font-size: 10px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .sug-pill:hover { background: rgba(91,156,246,0.2); }
</style>
</head>
<body>

<div class="app-shell">
  <!-- HEADER -->
  <div class="header">
    <div class="header-avatar">🎓</div>
    <div class="header-info">
      <h1>College Assistant</h1>
      <span>Online — Ready to help</span>
    </div>
    <div class="platform-badge">🌐 Web</div>
  </div>

  <!-- QUICK CHIPS -->
  <div class="chips" id="chips">
    <div class="chip" onclick="sendChip(this)">📅 Exam Schedule</div>
    <div class="chip" onclick="sendChip(this)">📋 Timetable</div>
    <div class="chip" onclick="sendChip(this)">📊 Results</div>
    <div class="chip" onclick="sendChip(this)">📚 Syllabus</div>
    <div class="chip" onclick="sendChip(this)">💰 Fee Info</div>
    <div class="chip" onclick="sendChip(this)">🏢 Contact Advisor</div>
  </div>

  <!-- MESSAGES -->
  <div class="messages" id="messages">
    <!-- welcome message injected by JS -->
  </div>

  <!-- INPUT -->
  <div class="input-area">
    <textarea class="input-box" id="inputBox" placeholder="Ask about exams, timetable, results…" rows="1"
      onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button class="send-btn" onclick="handleSend()">➤</button>
  </div>
</div>

<script>
// ─────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────
const state = {
  department: null, semester: null, intent: null, courseCode: null,
  turnCount: 0, awaitingSlot: null
};

// ─────────────────────────────────────────────
// KNOWLEDGE BASE
// ─────────────────────────────────────────────
const KB = {
  exam: {
    "CS-5": "CS Semester 5 exams start on 15th November 2024.",
    "CS-3": "CS Semester 3 exams are scheduled from 10th November 2024.",
    "BCA-3": "BCA 3rd semester exams begin on 12th November 2024.",
    "IT-5": "IT Semester 5 exams start on 14th November 2024.",
    "ECE-4": "ECE 4th semester exams start on 18th November 2024.",
  },
  timetable: {
    "CS-5": "CS Sem 5: Mon/Wed/Fri — Theory | Tue/Thu — Labs.",
    "BCA-3": "BCA Sem 3: Mon/Wed/Fri theory, Tue/Thu practicals.",
  },
  result: {
    "CS-4": "CS Semester 4 results declared on 20th September 2024.",
    "BCA-2": "BCA Sem 2 results are on the university portal.",
  }
};

// ─────────────────────────────────────────────
// NLU
// ─────────────────────────────────────────────
const ORDINALS = {first:"1",second:"2",third:"3",fourth:"4",fifth:"5",sixth:"6","1st":"1","2nd":"2","3rd":"3","4th":"4","5th":"5","6th":"6"};
const DEPT_MAP = {cs:"CS",cse:"CS",it:"IT",bca:"BCA",ece:"ECE",eee:"EEE",me:"ME",ai:"AI"};

function detectIntent(t) {
  t = t.toLowerCase();
  if (/exam|test|examination|when is/.test(t)) return "exam";
  if (/timetable|schedule|class time|timing/.test(t)) return "timetable";
  if (/result|marks|grade|score/.test(t)) return "result";
  if (/syllabus|topics|curriculum/.test(t)) return "syllabus";
  if (/fee|payment|challan/.test(t)) return "fee";
  if (/hi|hello|hey|help/.test(t)) return "greet";
  if (/advisor|contact|human|staff/.test(t)) return "advisor";
  if (/weather|cricket|movie|joke|bitcoin|ipl/.test(t)) return "oos";
  if (/ragging|harassment|mental|counselor/.test(t)) return "sensitive";
  return null;
}
function extractDept(t) {
  const l = t.toLowerCase();
  for (const [k,v] of Object.entries(DEPT_MAP)) {
    if (l.includes(k)) return v;
  }
  const m = t.match(/\b([A-Z]{2,4})\s?\d{3}/i);
  return m ? DEPT_MAP[m[1].toLowerCase()] || m[1].toUpperCase() : null;
}
function extractSem(t) {
  const l = t.toLowerCase();
  for (const [w,n] of Object.entries(ORDINALS)) { if (l.includes(w)) return n; }
  const m = l.match(/sem(?:ester)?\s*(\d)/);
  if (m) return m[1];
  const y = l.match(/(\d)\s*(?:st|nd|rd|th)?\s*year/);
  if (y) return String(parseInt(y[1])*2-1);
  return null;
}
function isOOS(t) {
  return /weather|cricket|movie|joke|bitcoin|ipl|netflix|instagram/.test(t.toLowerCase());
}
function isSensitive(t) {
  return /ragging|harassment|mental health|counselor|abuse/.test(t.toLowerCase());
}

// ─────────────────────────────────────────────
// BOT LOGIC
// ─────────────────────────────────────────────
function processInput(text) {
  state.turnCount++;
  const intent = detectIntent(text) || state.intent;
  const dept = extractDept(text) || state.department;
  const sem = extractSem(text) || state.semester;

  if (intent) state.intent = intent;
  if (dept) state.department = dept;
  if (sem) state.semester = sem;

  if (isSensitive(text)) {
    return {
      text: "This seems like a sensitive matter. Please reach out to our student welfare advisor.",
      type: "advisor",
      extra: { suggestions: [], advisorLink: true }
    };
  }

  if (isOOS(text)) {
    return {
      text: "That's outside my scope. I help with college queries: exams, timetables, results, fees, etc.",
      type: "warning",
      extra: { suggestions: ["📅 Exam Schedule", "📋 Timetable", "📊 Results"] }
    };
  }

  if (state.intent === "greet") {
    return { text: "Hello! 👋 I'm your college assistant. Ask me about exams, timetables, results, syllabus, or fees.", type: "info", extra: {} };
  }

  if (state.intent === "advisor") {
    return { text: "I'll connect you with a human advisor.", type: "advisor", extra: { advisorLink: true } };
  }

  if (state.intent === "fee") {
    return { text: "For fee-related queries, please visit the Accounts Department or check the student portal.", type: "info", extra: {} };
  }

  // Slot filling
  if (!state.department) {
    return { text: "Which department? (e.g., CS, BCA, IT, ECE)", type: "info", extra: { suggestions:["CS","BCA","IT","ECE"] } };
  }
  if (!state.semester) {
    return { text: "Which semester? (e.g., 3rd semester, sem 5)", type: "info", extra: { suggestions:["Sem 1","Sem 3","Sem 5","Sem 7"] } };
  }

  // Lookup
  const key = `${state.department}-${state.semester}`;
  let answer = KB[state.intent]?.[key];
  if (answer) {
    return { text: answer, type: "info", extra: {} };
  }
  return {
    text: `I don't have ${state.intent} data for ${state.department} Semester ${state.semester} right now. Please check the official notice board.`,
    type: "warning",
    extra: {}
  };
}

// ─────────────────────────────────────────────
// UI HELPERS
// ─────────────────────────────────────────────
function getTime() {
  return new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
}

function appendMessage(role, html, ts, type='info') {
  const msgs = document.getElementById('messages');
  const row = document.createElement('div');
  row.className = `msg-row ${role}`;

  const avatarEmoji = role === 'bot' ? '🎓' : '👤';
  const tagMap = { advisor:'tag-advisor', warning:'tag-warning', info:'tag-info' };
  const tagLabelMap = { advisor:'→ Advisor', warning:'Out of scope', info:'Info' };

  row.innerHTML = `
    <div class="avatar-sm">${avatarEmoji}</div>
    <div class="msg-col">
      <div class="bubble" id="bubble-${Date.now()}">
        ${role==='bot' && type!=='info' ? `<span class="tag ${tagMap[type]||'tag-info'}">${tagLabelMap[type]||''}</span><br>` : ''}
        ${html}
      </div>
      <div class="timestamp">${ts}</div>
    </div>`;

  msgs.appendChild(row);
  msgs.scrollTop = msgs.scrollHeight;
  return row;
}

function appendBotFull(result) {
  const msgs = document.getElementById('messages');
  const row = document.createElement('div');
  row.className = 'msg-row bot';

  let inner = result.text.replace(/\n/g,'<br>');

  let extras = '';
  if (result.extra?.advisorLink) {
    extras += `<br><a class="advisor-link" href="mailto:advisor@college.edu">📧 advisor@college.edu</a>`;
  }
  if (result.extra?.suggestions?.length) {
    extras += `<div class="suggestions">${result.extra.suggestions.map(s=>`<span class="sug-pill" onclick="sendChip(this)">${s}</span>`).join('')}</div>`;
  }

  const tagMap = { advisor:'tag-advisor', warning:'tag-warning', info:'tag-info' };
  const tagLabelMap = { advisor:'→ Human Advisor', warning:'⚠ Out of Scope', info:'' };

  row.innerHTML = `
    <div class="avatar-sm">🎓</div>
    <div class="msg-col">
      <div class="bubble">
        ${result.type !== 'info' ? `<span class="tag ${tagMap[result.type]}">${tagLabelMap[result.type]}</span><br>` : ''}
        ${inner}${extras}
      </div>
      <div class="timestamp">${getTime()}</div>
    </div>`;

  msgs.appendChild(row);
  msgs.scrollTop = msgs.scrollHeight;
}

function showTyping() {
  const msgs = document.getElementById('messages');
  const row = document.createElement('div');
  row.className = 'msg-row bot';
  row.id = 'typing';
  row.innerHTML = `
    <div class="avatar-sm">🎓</div>
    <div class="bubble">
      <div class="typing-indicator">
        <div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>
      </div>
    </div>`;
  msgs.appendChild(row);
  msgs.scrollTop = msgs.scrollHeight;
}

function removeTyping() {
  document.getElementById('typing')?.remove();
}

// ─────────────────────────────────────────────
// SEND HANDLERS
// ─────────────────────────────────────────────
function handleSend() {
  const box = document.getElementById('inputBox');
  const text = box.value.trim();
  if (!text) return;
  box.value = '';
  box.style.height = 'auto';
  sendMessage(text);
}

function sendChip(el) {
  const text = el.textContent.replace(/^[^\w]+/, '').trim();
  sendMessage(el.textContent.trim());
}

function sendMessage(text) {
  appendMessage('user', text, getTime(), 'info');
  showTyping();
  setTimeout(() => {
    removeTyping();
    const result = processInput(text);
    appendBotFull(result);
  }, 600 + Math.random()*400);
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    handleSend();
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = el.scrollHeight + 'px';
}

// ─────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  setTimeout(() => {
    appendBotFull({
      text: "Hello! 👋 I'm your college assistant. I can help with exam schedules, timetables, results, syllabus, fees, and more.\n\nWhat would you like to know?",
      type: "info",
      extra: { suggestions: ["📅 Exam Schedule", "📋 Timetable", "📊 Results", "📚 Syllabus"] }
    });
  }, 400);
});
</script>
</body>
</html>
